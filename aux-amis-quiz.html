<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUX AMIS サービス道場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f7f4ef;
  --surface:   #ffffff;
  --surface2:  #f0ece4;
  --border:    #e0d8cc;
  --border2:   #ccc4b4;
  --text:      #1e1a14;
  --text-sub:  #7a7060;
  --gold:      #b8963a;
  --gold2:     #d4aa50;
  --gold-dim:  #d4c090;
  --gold-pale: #faf5e8;
  --accent:    #2a4a35;
  --correct:   #2a6640;
  --correct-pale: #e8f5ed;
  --correct-border: #a0d0b0;
  --wrong:     #8b2a2a;
  --wrong-pale: #f5e8e8;
  --wrong-border: #d0a0a0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); min-height: 100vh; }

body {
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── PAGES ── */
.page {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  background: var(--bg);
  transition: opacity .4s ease, transform .4s cubic-bezier(.4,0,.2,1);
}

.page.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
}

.page.slide-out {
  opacity: 0;
  transform: translateX(-30px);
}

.page.slide-in {
  animation: slideInPage .4s cubic-bezier(.2,.8,.2,1) both;
}

/* ── TOP PAGE ── */
#page-top {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* decorative lines */
#page-top::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

#page-top::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.top-ornament-top {
  position: absolute;
  top: 32px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px;
  letter-spacing: .4em;
  color: var(--gold);
  opacity: .5;
  text-transform: uppercase;
}

.top-ornament-bottom {
  position: absolute;
  bottom: 32px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px;
  letter-spacing: .4em;
  color: var(--gold);
  opacity: .5;
  text-transform: uppercase;
}

.top-inner {
  max-width: 400px;
  width: 100%;
  animation: topEntrance .8s cubic-bezier(.2,.8,.2,1) both;
}

.top-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
  animation: fadeDown .6s .1s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.top-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 10vw, 52px);
  font-weight: 300;
  font-style: italic;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 6px;
  animation: fadeDown .6s .15s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.top-title span { color: var(--gold); }

.top-subtitle {
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: .15em;
  margin-bottom: 48px;
  animation: fadeDown .6s .2s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.top-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
  animation: fadeDown .6s .25s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.top-divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}

.top-divider-line:last-child {
  background: linear-gradient(270deg, transparent, var(--gold-dim));
}

.top-divider-diamond {
  width: 6px;
  height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
}

.top-modes {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  animation: fadeDown .6s .3s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.top-mode-btn {
  width: 100%;
  padding: 20px 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all .25s;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
}

.top-mode-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--gold), var(--gold2));
  transform: scaleY(0);
  transition: transform .25s;
}

.top-mode-btn:hover {
  border-color: var(--gold-dim);
  background: var(--gold-pale);
  transform: translateX(4px);
}

.top-mode-btn:hover::before { transform: scaleY(1); }

.top-mode-left {}

.top-mode-label {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}

.top-mode-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
}

.top-mode-desc {
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 2px;
}

.top-mode-arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold);
  opacity: .4;
  transition: opacity .25s, transform .25s;
}

.top-mode-btn:hover .top-mode-arrow {
  opacity: 1;
  transform: translateX(4px);
}

.top-count {
  margin-top: 32px;
  font-size: 11px;
  color: var(--text-sub);
  letter-spacing: .1em;
  animation: fadeDown .6s .35s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

/* ── SELECT PAGE ── */
#page-select {
  padding: 0 20px 80px;
  max-width: 660px;
  margin: 0 auto;
}

.select-header {
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-sub);
  transition: all .2s;
  flex-shrink: 0;
  font-family: 'Cormorant Garamond', serif;
}

.back-btn:hover { border-color: var(--gold); color: var(--gold); }

.select-header-text {}
.select-mode-label {
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2px;
}

.select-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  font-style: italic;
  color: var(--text);
}

.select-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.select-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all .22s;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  animation: cardSelectIn .4s ease both;
}

.select-card:nth-child(1) { animation-delay: .05s; }
.select-card:nth-child(2) { animation-delay: .1s; }
.select-card:nth-child(3) { animation-delay: .15s; }
.select-card:nth-child(4) { animation-delay: .2s; }
.select-card:nth-child(5) { animation-delay: .25s; }
.select-card:nth-child(6) { animation-delay: .3s; }
.select-card:nth-child(7) { animation-delay: .35s; }

.select-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--gold), var(--gold2));
  transform: scaleY(0);
  transition: transform .22s;
}

.select-card:hover {
  border-color: var(--gold-dim);
  background: var(--gold-pale);
  transform: translateX(5px);
}

.select-card:hover::before { transform: scaleY(1); }

.select-card-left { display: flex; align-items: center; gap: 16px; }

.select-card-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.select-card-icon.greeting { background: #e8f0eb; }
.select-card-icon.wine     { background: #faf4e6; }
.select-card-icon.food     { background: #fdeee8; }
.select-card-icon.ops      { background: #e8edf5; }
.select-card-icon.team     { background: #f0e8f5; }
.select-card-icon.trouble  { background: #f5e8e8; }
.select-card-icon.all      { background: var(--surface2); }
.select-card-icon.easy     { background: #e8f0eb; }
.select-card-icon.normal   { background: #faf4e6; }
.select-card-icon.hard     { background: #f5e8e8; }

.select-card-info {}
.select-card-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.select-card-count { font-size: 11px; color: var(--text-sub); }

.select-card-arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: var(--gold);
  opacity: .3;
  transition: opacity .2s, transform .2s;
}

.select-card:hover .select-card-arrow { opacity: 1; transform: translateX(3px); }

.diff-pips-row { display: flex; gap: 4px; }
.dpip { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); }
.dpip.on { background: var(--gold); }

/* ── QUIZ PAGE ── */
#page-quiz {
  padding: 0 20px 80px;
  max-width: 660px;
  margin: 0 auto;
}

.quiz-header {
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.quiz-header-text { flex: 1; }
.quiz-context-label {
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1px;
}

.quiz-context-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 300;
  font-style: italic;
  color: var(--text);
}

.progress-wrap { margin-bottom: 16px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); letter-spacing: .06em; margin-bottom: 8px; }
.progress-track { height: 1px; background: var(--border); position: relative; overflow: visible; }
.progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width .6s cubic-bezier(.4,0,.2,1); }

.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.stat-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 8px; text-align: center; position: relative; overflow: hidden; }
.stat-chip::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: .5; }
.stat-v { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--gold); line-height: 1; display: block; margin-bottom: 4px; }
.stat-chip.bump .stat-v { animation: bump .3s cubic-bezier(.34,1.56,.64,1); }
.stat-l { font-size: 9px; color: var(--text-sub); letter-spacing: .15em; text-transform: uppercase; }

/* quiz card */
.quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; animation: cardIn .45s cubic-bezier(.2,.8,.2,1) both; position: relative; }
.quiz-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 10%, var(--gold) 50%, transparent 90%); opacity: .5; }

.card-header { padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; }
.cat-tag { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; font-weight: 500; }
.cat-tag.greeting { background: #e8f0eb; color: #2a4a35; border: 1px solid #b0d0bc; }
.cat-tag.wine     { background: #faf4e6; color: #8b6020; border: 1px solid #d4c090; }
.cat-tag.food     { background: #fdeee8; color: #7a2a18; border: 1px solid #d4a898; }
.cat-tag.ops      { background: #e8edf5; color: #1a3060; border: 1px solid #a0b4d8; }
.cat-tag.team     { background: #f0e8f5; color: #4a1a6a; border: 1px solid #c4a0d8; }
.cat-tag.trouble  { background: #f5e8e8; color: #6a1a1a; border: 1px solid #d4a0a0; }

.diff-row { display: flex; gap: 4px; margin-left: auto; }
.diff-pip { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }
.diff-pip.on { background: var(--gold); box-shadow: 0 0 3px var(--gold2); }

.card-body { padding: 22px 24px 28px; }
.question-text { font-size: 15px; line-height: 1.85; color: var(--text); margin-bottom: 22px; font-weight: 300; }
.multi-note { display: inline-block; font-size: 10px; color: var(--gold); letter-spacing: .1em; border: 1px solid var(--gold-dim); padding: 3px 10px; border-radius: 2px; margin-bottom: 14px; background: var(--gold-pale); }

.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn { width: 100%; text-align: left; padding: 14px 18px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--text); cursor: pointer; transition: all .2s; display: flex; gap: 14px; align-items: flex-start; line-height: 1.7; position: relative; overflow: hidden; }
.opt-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold); transform: scaleY(0); transition: transform .2s; transform-origin: center; }
.opt-btn:hover:not(:disabled) { border-color: var(--gold-dim); background: var(--gold-pale); }
.opt-btn:hover:not(:disabled)::before { transform: scaleY(1); }
.opt-letter { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; font-weight: 300; color: var(--gold); flex-shrink: 0; min-width: 18px; line-height: 1.4; opacity: .6; transition: opacity .2s; }
.opt-btn:hover:not(:disabled) .opt-letter { opacity: 1; }
.opt-btn:disabled { cursor: default; }
.opt-btn.selected { border-color: var(--gold-dim); background: var(--gold-pale); }
.opt-btn.selected::before { transform: scaleY(1); }
.opt-btn.selected .opt-letter { opacity: 1; }
.opt-btn.correct { border-color: var(--correct-border); background: var(--correct-pale); animation: correctPulse .4s ease both; }
.opt-btn.correct::before { transform: scaleY(1); background: var(--correct); }
.opt-btn.correct .opt-letter { color: var(--correct); opacity: 1; }
.opt-btn.wrong { border-color: var(--wrong-border); background: var(--wrong-pale); animation: wrongShake .4s ease both; }
.opt-btn.wrong::before { transform: scaleY(1); background: var(--wrong); }
.opt-btn.wrong .opt-letter { color: var(--wrong); opacity: 1; }
.opt-btn.dim { opacity: .25; }

.submit-btn { margin-top: 14px; width: 100%; padding: 13px; border-radius: 4px; border: 1px solid var(--gold-dim); background: var(--gold-pale); color: var(--gold); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: .12em; transition: all .25s; }
.submit-btn:hover:not(:disabled) { background: var(--gold); color: #fff; border-color: var(--gold); }
.submit-btn:disabled { opacity: .3; cursor: default; }

.feedback { margin-top: 20px; animation: fadeUp .35s ease both; }
.result-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 2px; font-size: 12px; font-weight: 500; letter-spacing: .1em; margin-bottom: 14px; animation: pillIn .35s cubic-bezier(.34,1.56,.64,1) both; }
.result-pill.ok { background: var(--correct-pale); color: var(--correct); border: 1px solid var(--correct-border); }
.result-pill.ng { background: var(--wrong-pale); color: var(--wrong); border: 1px solid var(--wrong-border); }

.explain-box { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 0 4px 4px 0; padding: 16px 18px; animation: explainIn .4s .1s cubic-bezier(.2,.8,.2,1) both; }
.explain-label { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; opacity: .7; }
.explain-text { font-size: 12px; line-height: 1.9; color: var(--text-sub); font-weight: 300; }

.next-btn { margin-top: 16px; width: 100%; padding: 15px; border-radius: 4px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 400; cursor: pointer; letter-spacing: .15em; transition: all .25s; animation: fadeUp .4s .18s cubic-bezier(.2,.8,.2,1) both; opacity: 0; animation-fill-mode: both; position: relative; overflow: hidden; }
.next-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: translateX(-100%); transition: transform .3s ease; z-index: 0; }
.next-btn:hover::before { transform: translateX(0); }
.next-btn:hover { color: #fff; }
.next-btn span { position: relative; z-index: 1; }

/* ── FINAL ── */
.final { text-align: center; padding: 60px 16px 40px; animation: fadeUp .6s ease both; }
.final-ornament { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--gold); letter-spacing: .4em; margin-bottom: 32px; opacity: .6; }
.final-circle { width: 160px; height: 160px; border-radius: 50%; border: 1px solid var(--gold-dim); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 32px; background: radial-gradient(ellipse at center, var(--gold-pale) 0%, transparent 70%); position: relative; animation: scaleIn .6s .2s cubic-bezier(.34,1.56,.64,1) both; }
.final-circle::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid var(--border); }
.final-circle::after { content: ''; position: absolute; inset: -12px; border-radius: 50%; border: 1px solid var(--border); opacity: .4; }
.final-num { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 300; color: var(--gold); line-height: 1; }
.final-denom { font-size: 12px; color: var(--text-sub); letter-spacing: .1em; margin-top: 4px; }
.final-rank { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 16px; letter-spacing: .04em; }
.final-divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); margin: 0 auto 20px; }
.final-msg { font-size: 13px; color: var(--text-sub); line-height: 2; max-width: 380px; margin: 0 auto 36px; font-weight: 300; }

.final-btns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.restart-btn { padding: 13px 48px; border-radius: 2px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 400; cursor: pointer; letter-spacing: .2em; transition: all .25s; }
.restart-btn:hover { background: var(--gold); color: #fff; }
.home-btn { padding: 10px 48px; border-radius: 2px; border: 1px solid var(--border); background: transparent; color: var(--text-sub); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; cursor: pointer; letter-spacing: .15em; transition: all .25s; }
.home-btn:hover { border-color: var(--text-sub); color: var(--text); }

.empty-msg { text-align: center; padding: 60px 0; color: var(--text-sub); font-size: 13px; font-weight: 300; line-height: 2; }

/* ── PASSWORD ── */
#pw-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; padding: 32px; font-family: 'Noto Sans JP', sans-serif; }
#pw-screen::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.pw-brand-en { font-family: 'Cormorant Garamond', serif; font-size: 11px; font-weight: 300; letter-spacing: .35em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.pw-brand-ja { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; font-style: italic; color: var(--text); letter-spacing: .04em; margin-bottom: 4px; }
.pw-brand-ja span { color: var(--gold); }
.pw-sub { font-size: 11px; color: var(--text-sub); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 48px; }
.pw-divider { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-bottom: 48px; }

/* ── ANIMATIONS ── */
@keyframes topEntrance {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: none; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
@keyframes cardIn {
  0%   { opacity: 0; transform: translateY(24px) scale(.98); filter: blur(2px); }
  60%  { filter: blur(0); }
  100% { opacity: 1; transform: none; }
}
@keyframes cardSelectIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: none; }
}
@keyframes slideInPage {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: none; }
}
@keyframes correctPulse {
  0%   { box-shadow: 0 0 0 0 rgba(42,102,64,.35); }
  40%  { box-shadow: 0 0 0 8px rgba(42,102,64,.1); }
  100% { box-shadow: 0 0 0 12px rgba(42,102,64,0); }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20%  { transform: translateX(-5px); }
  40%  { transform: translateX(4px); }
  60%  { transform: translateX(-3px); }
  80%  { transform: translateX(2px); }
}
@keyframes pillIn {
  0%   { opacity: 0; transform: scale(.85) translateY(6px); }
  70%  { transform: scale(1.03); }
  100% { opacity: 1; transform: none; }
}
@keyframes bump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.25); }
  70%  { transform: scale(.95); }
  100% { transform: scale(1); }
}
@keyframes explainIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
@keyframes scaleIn {
  0%   { transform: scale(0.5); opacity: 0; }
  60%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    if (p.id === id) {
      p.classList.remove('hidden');
      p.classList.add('slide-in');
      setTimeout(() => p.classList.remove('slide-in'), 500);
    } else {
      p.classList.add('hidden');
    }
  });
  window.scrollTo(0, 0);
}

function goTop() {
  showPage('page-top');
}

function goSelect(mode) {
  currentMode = mode;
  const items = mode === 'cat' ? CATS : DIFFS;
  document.getElementById('select-mode-label').textContent = mode === 'cat' ? 'Mode A' : 'Mode B';
  document.getElementById('select-title').textContent = mode === 'cat' ? 'カテゴリを選ぶ' : '難易度を選ぶ';

  const grid = document.getElementById('select-grid');
  grid.innerHTML = items.map(item => {
    const pipsHtml = mode === 'diff' && item.pips > 0
      ? `<div class="diff-pips-row">${[1,2,3].map(n=>`<div class="dpip ${n<=item.pips?'on':''}"></div>`).join('')}</div>`
      : '';
    return `
      <div class="select-card" onclick="startQuiz('${item.key}','${item.label}')">
        <div class="select-card-left">
          <div class="select-card-icon ${item.cls}">${item.icon}</div>
          <div class="select-card-info">
            <div class="select-card-name">${item.label}</div>
            <div class="select-card-count">${item.count}問 ${pipsHtml}</div>
          </div>
        </div>
        <div class="select-card-arrow">→</div>
      </div>`;
  }).join('');

  showPage('page-select');
}

function startQuiz(filterKey, filterLabel) {
  currentFilter = filterKey;
  currentFilterLabel = filterLabel;

  document.getElementById('quiz-context-label').textContent = currentMode === 'cat' ? 'カテゴリ' : '難易度';
  document.getElementById('quiz-context-title').textContent = filterLabel;

  idx = 0; correct = 0; wrong = 0; streak = 0; answered = false; selectedOpts = [];
  buildPool();
  document.getElementById('final').classList.add('hidden');
  updateStats();
  render();
  showPage('page-quiz');
}

function restartQuiz() {
  startQuiz(currentFilter, currentFilterLabel);
}

function buildPool() {
  let base = BANK;
  if (currentMode === 'cat' && currentFilter !== 'all') base = base.filter(q => q.cat === currentFilter);
  if (currentMode === 'diff' && currentFilter !== 'all') base = base.filter(q => String(q.diff) === currentFilter);
  pool = shuffle(base);
}

function bumpChip(id) {
  const el = document.getElementById(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 400);
}

function updateStats() {
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-streak').textContent = streak;
  const t = pool.length, pct = t ? Math.round((idx / t) * 100) : 0;
  document.getElementById('prog-label').textContent = `問題 ${Math.min(idx+1,t)} / ${t}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

function render() {
  const area = document.getElementById('quiz-area');
  if (!pool.length) {
    area.innerHTML = `<div class="empty-msg">この条件には問題がありません。</div>`;
    return;
  }
  if (idx >= pool.length) { showFinal(); area.innerHTML = ''; return; }
  const q = pool[idx], L = ['A','B','C','D'];
  const pips = [1,2,3].map(n=>`<div class="diff-pip ${n<=q.diff?'on':''}"></div>`).join('');
  const multiNote = q.multi ? `<div class="multi-note">※ 複数選択可</div>` : '';

  area.innerHTML = `
    <div class="quiz-card">
      <div class="card-header">
        <span class="cat-tag ${q.cat}">${q.catLabel}</span>
        <div class="diff-row">${pips}</div>
      </div>
      <div class="card-body">
        <p class="question-text">${q.q}</p>
        ${multiNote}
        <div class="options" id="opts">
          ${q.opts.map((o,i)=>`
            <button class="opt-btn" id="opt${i}" onclick="${q.multi?`toggleOpt(${i})`:`pick(${i})`}">
              <span class="opt-letter">${L[i]}.</span>
              <span>${o}</span>
            </button>
          `).join('')}
        </div>
        ${q.multi?`<button class="submit-btn" id="submit-btn" onclick="submitMulti()" disabled>回答する</button>`:''}
        <div id="fb"></div>
      </div>
    </div>`;
  answered = false;
  selectedOpts = [];
}

function toggleOpt(i) {
  if (answered) return;
  const btn = document.getElementById('opt'+i);
  const pos = selectedOpts.indexOf(i);
  if (pos === -1) { selectedOpts.push(i); btn.classList.add('selected'); }
  else { selectedOpts.splice(pos,1); btn.classList.remove('selected'); }
  document.getElementById('submit-btn').disabled = selectedOpts.length === 0;
}

function submitMulti() {
  if (answered || selectedOpts.length === 0) return;
  const q = pool[idx];
  const ok = q.ans.slice().sort().join(',') === selectedOpts.slice().sort().join(',');
  showFeedback(ok, q);
}

function pick(sel) {
  if (answered) return;
  const q = pool[idx];
  showFeedback(q.ans.includes(sel), q, sel);
}

function showFeedback(ok, q, sel) {
  answered = true;
  const L = ['A','B','C','D'];
  ok ? correct++ : wrong++;
  streak = ok ? streak + 1 : 0;
  updateStats();
  bumpChip(ok ? 'chip-correct' : 'chip-wrong');
  if (ok && streak > 1) bumpChip('chip-streak');

  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    b.classList.remove('selected');
    if (q.ans.includes(i)) b.classList.add('correct');
    else if (q.multi ? selectedOpts.includes(i) : i === sel) b.classList.add('wrong');
    else b.classList.add('dim');
  });

  const correctLabels = q.ans.map(i=>L[i]).join('・');
  document.getElementById('fb').innerHTML = `
    <div class="feedback">
      <div class="result-pill ${ok?'ok':'ng'}">${ok?'✓ 正解':'✗ 不正解 — 正解は '+correctLabels}</div>
      <div class="explain-box">
        <div class="explain-label">Explication</div>
        <p class="explain-text">${q.exp}</p>
      </div>
      <button class="next-btn" onclick="nextQ()"><span>${idx+1<pool.length?'次の問題へ →':'結果を見る →'}</span></button>
    </div>`;

  const sb = document.getElementById('submit-btn');
  if (sb) sb.style.display = 'none';
}

function nextQ() { idx++; updateStats(); render(); }

function showFinal() {
  document.getElementById('final').classList.remove('hidden');
  const t = pool.length, pct = t ? Math.round((correct/t)*100) : 0;
  document.getElementById('f-num').textContent = correct;
  document.getElementById('f-denom').textContent = '/ ' + t;
  const ranks = [
    [100, 'Chef de Service',   '完璧です。全問正解はAUX AMISの接客を完全に体得している証拠。ぜひ後輩の指導役として活躍してください。'],
    [80,  "Maître d'hôtel",   '素晴らしい！基本の動きと判断力がしっかり身についています。苦手な問題を振り返って、次は満点を狙いましょう。'],
    [60,  'Serveur Confirmé', '合格ラインです。知識の土台はできています。つまずいたカテゴリに絞って繰り返し練習しましょう。'],
    [40,  'Commis de salle',  'まだ伸びしろがたくさんあります。カテゴリ別モードで一つずつ確実にクリアしていきましょう。'],
    [0,   'Apprenti',         'ここからがスタートです。まず「言葉遣い・敬語」と「オペレーション」から始めると、毎日の仕事がすぐ変わります。'],
  ];
  const [,rank,msg] = ranks.find(([min]) => pct >= min);
  document.getElementById('f-rank').textContent = rank;
  document.getElementById('f-msg').textContent = msg;
  document.getElementById('prog-fill').style.width = '100%';
}

</script>
</body>
</html>
